name: full_chain
summary: Build, prepare, train, infer, and analyze triplet candidates.
steps:
  - run: make pipeline_full ROOT_INPUT=${ROOT_INPUT} MAX_EVENTS=${MAX_EVENTS} PYTHON=${PYTHON} SELECT_STRATEGY=${SELECT_STRATEGY} SELECT_MIN_SCORE=${SELECT_MIN_SCORE} SELECT_MAX_TOP=${SELECT_MAX_TOP}
  - run: make manifest MAX_EVENTS=${MAX_EVENTS} PYTHON=${PYTHON} SELECT_STRATEGY=${SELECT_STRATEGY} SELECT_MIN_SCORE=${SELECT_MIN_SCORE} SELECT_MAX_TOP=${SELECT_MAX_TOP}
defaults:
  ROOT_INPUT: /global/homes/h/haichen/disk/top/ttbar.root
  MAX_EVENTS: 40000
  PYTHON: .venv/bin/python
  SELECT_STRATEGY: greedy_disjoint
  SELECT_MIN_SCORE: 0.5
  SELECT_MAX_TOP: 4
