name: infer_plus_analysis
summary: Reuse existing prepared datasets and trained model to run inference and score-based selection.
steps:
  - run: make infer MAX_EVENTS=${MAX_EVENTS} PYTHON=${PYTHON}
  - run: make analyze MAX_EVENTS=${MAX_EVENTS} PYTHON=${PYTHON} SELECT_STRATEGY=${SELECT_STRATEGY} SELECT_MIN_SCORE=${SELECT_MIN_SCORE} SELECT_MAX_TOP=${SELECT_MAX_TOP}
  - run: make manifest MAX_EVENTS=${MAX_EVENTS} PYTHON=${PYTHON} SELECT_STRATEGY=${SELECT_STRATEGY} SELECT_MIN_SCORE=${SELECT_MIN_SCORE} SELECT_MAX_TOP=${SELECT_MAX_TOP}
defaults:
  MAX_EVENTS: 40000
  PYTHON: .venv/bin/python
  SELECT_STRATEGY: greedy_disjoint
  SELECT_MIN_SCORE: 0.5
  SELECT_MAX_TOP: 4
